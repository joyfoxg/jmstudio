name: Build and Publish Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with v, e.g., v3.9.27

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller bottle pywebview Pillow google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Create client_secrets.json from Secret or dummy
        shell: bash
        env:
          CLIENT_SECRETS: ${{ secrets.CLIENT_SECRETS_JSON }}
        run: |
          if [ -n "$CLIENT_SECRETS" ]; then
            echo "$CLIENT_SECRETS" > client_secrets.json
          else
            echo '{"installed":{"client_id":"dummy","project_id":"dummy","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token","auth_provider_x509_cert_url":"https://www.googleapis.com/oauth2/v1/certs","client_secret":"dummy","redirect_uris":["http://localhost"]}}' > client_secrets.json
          fi

      - name: Compile Executable with PyInstaller
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed --add-data "jmstudio/frontend;jmstudio/frontend" --add-data "client_secrets.json;." --hidden-import googleapiclient.discovery --hidden-import google.oauth2.credentials --hidden-import google.auth.transport.requests --hidden-import google_auth_oauthlib.flow --icon=app_icon.ico --name="JoyMarkdownStudio" jmstudio/__main__.py

      - name: Rename Executable to match version
        shell: bash
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION_NAME=${TAG_NAME#v}
          mv dist/JoyMarkdownStudio.exe dist/JoyMarkdownStudio_v${VERSION_NAME}.exe

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/JoyMarkdownStudio_v*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
